<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gabriel Montenegro · GABSE Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0B1120;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Tarjeta de preview (1200x627) */
        .preview-card {
            width: 1200px;
            height: 627px;
            background: #0B1120;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        /* Elementos decorativos */
        .bg-circle {
            position: absolute;
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .circle-1 { width: 500px; height: 500px; }
        .circle-2 { width: 400px; height: 400px; border-color: rgba(6, 182, 212, 0.15); border-style: dashed; }
        .circle-3 { width: 300px; height: 300px; border-color: rgba(16, 185, 129, 0.1); }
        
        /* Puntos decorativos */
        .dot {
            position: absolute;
            background: #F97316;
            border-radius: 50%;
            opacity: 0.6;
        }
        .dot-1 { width: 4px; height: 4px; top: 20%; left: 15%; }
        .dot-2 { width: 6px; height: 6px; bottom: 25%; right: 20%; }
        .dot-3 { width: 3px; height: 3px; top: 60%; right: 10%; }
        .dot-4 { width: 5px; height: 5px; bottom: 40%; left: 12%; }
        
        /* Contenido principal */
        .content {
            position: relative;
            z-index: 2;
        }
        
        .logo-g {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #3B82F6, #06B6D4, #10B981);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 8px;
            margin-bottom: 20px;
        }
        
        .name {
            font-size: 48px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        
        .title {
            font-size: 24px;
            font-weight: 500;
            color: #06B6D4;
            margin-bottom: 24px;
            letter-spacing: 3px;
        }
        
        .separator {
            width: 100px;
            height: 2px;
            background: #F97316;
            margin: 0 auto 24px auto;
            opacity: 0.6;
        }
        
        .description {
            font-size: 16px;
            color: #94A3B8;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .tech-badge {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 32px;
        }
        
        .tech-item {
            background: rgba(45, 156, 124, 0.15);
            border: 1px solid rgba(45, 156, 124, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            color: #4ECDC4;
            letter-spacing: 0.5px;
        }
        
        .url {
            margin-top: 40px;
            font-size: 18px;
            font-weight: 600;
            color: #06B6D4;
            letter-spacing: 4px;
            text-decoration: none;
        }
        
        /* Efecto de brillo sutil */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: 30%;
            left: 20%;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="preview-card">
    <!-- Decoración -->
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>
    <div class="bg-circle circle-3"></div>
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="glow"></div>
    
    <!-- Contenido -->
    <div class="content">
        <div class="logo-g">GABSE</div>
        <div class="name">Gabriel Montenegro</div>
        <div class="title">Digital Commerce Analyst · VTEX Specialist</div>
        <div class="separator"></div>
        <div class="description">
            Especialista en VTEX IO, automatización con n8n, Apps Script y Cloudflare.<br>
            +50 proyectos de implementación · +26% conversión en checkout
        </div>
        <div class="tech-badge">
            <span class="tech-item">VTEX IO</span>
            <span class="tech-item">n8n</span>
            <span class="tech-item">Apps Script</span>
            <span class="tech-item">Cloudflare</span>
            <span class="tech-item">Power BI</span>
        </div>
        <div class="url">gabse.vercel.app</div>
    </div>
</div>
</body>
</html>
